        title: 用户输入
        type: start
        variables:
        - default: 'GuardAlign models image patch embeddings and unsafe text embeddings
            as two discrete distributions.  The cost matrix is defined by cosine distance:
            C(m,n) = 1 - cos(x_m, z_n). The transport plan is computed with optimal
            transport. Patch-level suspiciousness can be computed by aggregating T(m,n)
            * C(m,n) over text tokens or text variants.'
          hint: ''
          label: paper_excerpt
          options: []
          placeholder: ''
          required: true
          type: text-input
          variable: paper_excerpt
        - default: 'C(m,n) = 1 - cos(x_m, z_n)

            OT = <T, C>

            patch_score(m) = sum_n T(m,n) * C(m,n)'
          hint: ''
          label: equations
          options: []
          placeholder: ''
          required: true
          type: paragraph
          variable: equations
        - default: 'Use PyTorch

            Add unit tests

            Keep code minimal but runnable

            Use Sinkhorn for entropic OT'
          hint: ''
          label: constraints
          options: []
          placeholder: ''
          required: true
          type: paragraph
          variable: constraints
        - default: GuadAlien-OP
          hint: ''
          label: task_name
          options: []
          placeholder: ''
          required: true
          type: text-input
          variable: task_name
        - default: '2'
          hint: Maximum automatic repair rounds after the first test failure. Use
            an integer such as 0, 1, 2, or 3.
          label: repair_rounds
          options: []
          placeholder: '2'
          required: true
          type: text-input
          variable: repair_rounds
