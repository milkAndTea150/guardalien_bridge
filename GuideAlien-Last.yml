    - data:
        code: "import json\n\ndef main(spec_json, paper_excerpt: str, equations: str,\
          \ constraints: str, task_name: str):\n    spec = spec_json if isinstance(spec_json,\
          \ dict) else {}\n    equations_list = [line.strip() for line in equations.splitlines()\
          \ if line.strip()]\n    constraints_list = [line.strip() for line in constraints.splitlines()\
          \ if line.strip()]\n    project_name = (str(task_name).strip() if task_name\
          \ is not None else \"\") or spec.get(\"algorithm_name\", \"guardalign_op\"\
          )\n\n    codex_instruction = f\"\"\"\nYou are implementing an AI research\
          \ algorithm from a structured specification.\n\nGenerate a minimal runnable\
          \ Python project.\n\nProject requirements:\n- Use PyTorch.\n- Run on CPU.\n\
          - Do not download external models or datasets.\n- Use synthetic embeddings\
          \ for tests.\n- Include pytest tests.\n- Include a toy example.\n- Include\
          \ implementation_report.md.\n- Do not claim to replace POT or GeomLoss.\n\
          - Treat POT/GeomLoss only as optional reference oracles.\n- Default tests\
          \ must not require POT, GeomLoss, CLIP, GPU, or internet.\n- For files under\
          \ examples/, do not use invalid filesystem-style imports such as `from ../src.xxx`.\n\
          - Example scripts must be runnable from the project root. Use pathlib +\
          \ sys.path insertion if needed.\n\nRequired project files:\n- algorithm_spec.json\n\
          - src/__init__.py\n- src/guardalign_op.py\n- tests/test_guardalign_op.py\n\
          - examples/run_toy_guardalign_op.py\n- implementation_report.md\n- README.md\n\
          \nDo NOT generate extra optional comparison files by default.\nDo NOT generate\
          \ tests/test_cosine_vs_op.py unless explicitly requested by the user in\
          \ a later manual step.\nDo NOT generate examples/compare_cosine_vs_op.py\
          \ unless explicitly requested by the user in a later manual step.\n\nCore\
          \ functions expected for GuardAlign-style OP:\n- compute_cost_matrix(image_embeds,\
          \ text_embeds, eps=1e-8)\n- sinkhorn_transport(cost_matrix, epsilon=0.05,\
          \ num_iters=100, tol=1e-6)\n- compute_patch_scores(transport_plan, cost_matrix)\n\
          - guardalign_op_score(image_embeds, text_embeds, epsilon=0.05, num_iters=100)\n\
          \nCore OP testing requirements:\n- import test\n- cost matrix shape test\n\
          - cost matrix finite value test\n- transport plan non-negative test\n- row/column\
          \ marginal constraint test\n- identity matching toy case\n- permutation\
          \ matching toy case\n- patch score shape test\n- end-to-end output keys\
          \ test\n- invalid feature dimension test\n\nReturn valid JSON only:\n{{\n\
          \  \"project_name\": \"{project_name}\",\n  \"files\": {{\n    \"algorithm_spec.json\"\
          : \"...\",\n    \"src/__init__.py\": \"...\",\n    \"src/guardalign_op.py\"\
          : \"...\",\n    \"tests/test_guardalign_op.py\": \"...\",\n    \"examples/run_toy_guardalign_op.py\"\
          : \"...\",\n    \"implementation_report.md\": \"...\",\n    \"README.md\"\
          : \"...\"\n  }},\n  \"summary\": \"...\",\n  \"assumptions\": [\"...\"]\n\
          }}\n\nalgorithm_spec.json:\n{json.dumps(spec, ensure_ascii=False, indent=2)}\n\
          \"\"\"\n\n    payload = {\n        \"task_name\": str(task_name) if task_name\
          \ is not None else \"\",\n        \"project_name\": project_name,\n    \
          \    \"algorithm_spec\": spec,\n        \"paper_excerpt\": paper_excerpt,\n\
          \        \"equations\": equations_list or spec.get(\"core_equations\", []),\n\
          \        \"constraints\": constraints_list or spec.get(\"engineering_assumptions\"\
          , []),\n        \"codex_instruction\": codex_instruction,\n    }\n    return\
          \ {\n        \"task_name\": str(task_name) if task_name is not None else\
          \ \"\",\n        \"project_name\": project_name,\n        \"paper_excerpt\"\
          : paper_excerpt,\n        \"equations_list\": payload[\"equations\"],\n\
          \        \"constraints_list\": payload[\"constraints\"],\n        \"spec_goal\"\
          : spec.get(\"goal\", \"\"),\n        \"algorithm_spec_json\": json.dumps(spec,\
          \ ensure_ascii=False),\n        \"request_body\": json.dumps(payload, ensure_ascii=False),\n\
          \    }\n"
        code_language: python3
