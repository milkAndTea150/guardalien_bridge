        prompt_template:
        - id: spec-system-v2
          role: system
          text: 'You are an AI research algorithm specification assistant.


            Your task is to convert a paper''s algorithm description into a structured
            implementation specification.


            Return valid JSON only.


            Important rules:

            1. Do not generate code.

            2. Distinguish paper-specified details from engineering assumptions.

            3. Do not claim that we are replacing mature libraries.

            4. For OP/Sinkhorn, frame mature libraries such as POT or GeomLoss as
            optional reference oracles.

            5. Make tests focus on mathematical properties, not only code execution.

            6. The first demo must run on CPU with synthetic embeddings.'
        - id: spec-user-v2
          role: user
          text: "Task name: {{#1775985079626.task_name#}}\nPaper excerpt:\n{{#1775985079626.paper_excerpt#}}\n\
            Equations:\n{{#1775985079626.equations#}}\nConstraints:\n{{#1775985079626.constraints#}}\n\
            \nReturn JSON with this schema:\n{\n  \"algorithm_name\": \"...\",\n \
            \ \"research_context\": \"...\",\n  \"task_type\": \"...\",\n  \"goal\"\
            : \"...\",\n  \"inputs\": {\"name\": \"shape and meaning\"},\n  \"outputs\"\
            : {\"name\": \"shape and meaning\"},\n  \"symbols\": {\"symbol\": \"meaning\"\
            },\n  \"core_equations\": [\"...\"],\n  \"core_steps\": [\"...\"],\n \
            \ \"functions\": [{\"name\": \"...\", \"purpose\": \"...\", \"inputs\"\
            : \"...\", \"outputs\": \"...\", \"paper_step_mapping\": \"which equation\
            \ or text this implements\"}],\n  \"engineering_assumptions\": [\"...\"\
            ],\n  \"ambiguity_notes\": [\"...\"],\n  \"reference_libraries\": [{\"\
            name\": \"POT\", \"role\": \"optional reference oracle, not required dependency\"\
            }, {\"name\": \"GeomLoss\", \"role\": \"optional differentiable OT backend,\
            \ not required dependency\"}],\n  \"required_tests\": [{\"name\": \"...\"\
            , \"purpose\": \"...\", \"expected_property\": \"...\"}],\n  \"demo_scope\"\
            : {\"must_have\": [\"...\"], \"optional\": [\"...\"], \"out_of_scope\"\
            : [\"...\"]}\n}"
        selected: false
        structured_output:
